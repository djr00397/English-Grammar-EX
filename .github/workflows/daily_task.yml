name: Automatic Telegram Grammar Bot

on:
  schedule:
    - cron: '0 6 * * *'   # বাংলাদেশ সময় দুপুর ১২:০০ টা
    - cron: '0 18 * * *'  # বাংলাদেশ সময় রাত ১২:০০ টা
  workflow_dispatch: # হাত দিয়ে টেস্ট করার জন্য

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # এখানে ভার্সন আপডেট করা হয়েছে

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
      run: python bot.py

    - name: Commit and Push Leaderboard Changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add leaderboard.json
        git diff-index --quiet HEAD || git commit -m "Update Leaderboard [Skip CI]"
        git push
        
